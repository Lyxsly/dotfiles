"$schema" = 'https://starship.rs/config-schema.json'
format = """
$directory\
[¯é░ ](fg:#88C0D0 bg:#1d2230)\
$git_branch\
$git_commit\
$git_status\
[¯é░ ](fg:#1d2230)\
$c$cpp$cmake$python$rust$nodejs$ruby\
\n$character
"""

right_format = """
$cmd_duration\
$username\
Ô£¿
$time
"""

add_newline = true

[username]
style_user = "white bold"
style_root = "black bold"
format = "user: [$user]($style) "
disabled = false

[fill]
symbol = ' '

[directory]
style = "fg:#2E3440 bg:#88C0D0 bold"
# format = "[ $path ]($style)"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "ÔÇĞ/"
# truncation_symbol = '´ü╝ ' # nf-fa-folder_open
# truncate_to_repo = false
# style = 'fg:#7aa2f7 bg:#1a1b26'
read_only = ' ¾░î¥ ' # nf-md-lock
read_only_style = 'fg:#f7768e bg:#1a1b26'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éİ "
style = "bg:#1d2230"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#1d2230)]($style)'

[git_commit]
tag_symbol = ' ´ÉÆ '

[git_status]
style = "bg:#1d2230"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#1d2230)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[$duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
# style = "bg:#1d2230"
format = '[[ ¯é│ ´Çù $time ](fg:#a0a9cb)]($style)'

